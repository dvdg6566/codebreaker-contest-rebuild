# Add this to your submissions table definition in CloudFormation/SAM template

# For CloudFormation DynamoDB table:
GlobalSecondaryIndexes:
  - IndexName: contestIndex
    KeySchema:
      - AttributeName: contestId
        KeyType: HASH
      - AttributeName: submissionTime
        KeyType: RANGE
    Projection:
      ProjectionType: ALL
    ProvisionedThroughput:
      ReadCapacityUnits: 5
      WriteCapacityUnits: 5

# Also add these to AttributeDefinitions (if not already present):
AttributeDefinitions:
  - AttributeName: contestId
    AttributeType: S
  - AttributeName: submissionTime
    AttributeType: S

---
