AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ECR repository, CodeBuild project, and automated compiler Lambda deployment
Parameters:
  JudgeName:
    Type: String
Resources:
  CompilerECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName:
        Fn::Sub: ${JudgeName}-compiler-repository
      RepositoryPolicyText:
        Version: '2012-10-17'
        Statement:
        - Sid: LambdaECRImageRetrievalPolicy
          Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action:
          - ecr:GetDownloadUrlForLayer
          - ecr:BatchGetImage
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName:
        Fn::Sub: ${JudgeName}-codebuild
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Action:
          - sts:AssumeRole
          Effect: Allow
          Principal:
            Service:
            - codebuild.amazonaws.com
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryFullAccess
      - arn:aws:iam::aws:policy/CloudWatchFullAccess
  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Description: CodeBuild Project to build compiler docker image
      ServiceRole:
        Fn::GetAtt:
        - CodeBuildRole
        - Arn
      Name:
        Fn::Sub: ${JudgeName}-codebuildproject
      Artifacts:
        Type: no_artifacts
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:6.0
        PrivilegedMode: true
        EnvironmentVariables:
        - Name: AWS_DEFAULT_REGION
          Value:
            Ref: AWS::Region
        - Name: AWS_ACCOUNT_ID
          Value:
            Ref: AWS::AccountId
        - Name: IMAGE_REPO_NAME
          Value:
            Fn::Sub: ${JudgeName}-compiler-repository
      Source:
        Type: GITHUB
        Location: https://github.com/dvdg6566/codebreaker-contest-manager
        BuildSpec: auto/compiler/buildspec.yml
  CompilerFunctionIAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName:
        Fn::Sub: ${JudgeName}-compiler-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service:
            - lambda.amazonaws.com
          Action:
          - sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/AmazonS3FullAccess
      - arn:aws:iam::aws:policy/AmazonDynamoDBReadOnlyAccess
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
  CodeBuildTriggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: ${JudgeName}-codebuild-trigger
      Description: Custom Resource handler that triggers CodeBuild and creates Compiler
        Lambda
      CodeUri: CodeBuildTriggerFunction
      Handler: lambda_function.lambda_handler
      Runtime: python3.14
      Timeout: 900
      MemorySize: 256
      Environment:
        Variables:
          judgeName:
            Ref: JudgeName
          AWS_ACCOUNT_ID:
            Ref: AWS::AccountId
      Policies:
      - Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action:
          - codebuild:StartBuild
          - codebuild:BatchGetBuilds
          Resource:
            Fn::GetAtt:
            - CodeBuildProject
            - Arn
        - Effect: Allow
          Action:
          - lambda:CreateFunction
          - lambda:UpdateFunctionCode
          - lambda:DeleteFunction
          - lambda:GetFunction
          Resource:
            Fn::Sub: arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${JudgeName}-compiler
        - Effect: Allow
          Action:
          - iam:PassRole
          Resource:
            Fn::GetAtt:
            - CompilerFunctionIAMRole
            - Arn
        - Effect: Allow
          Action:
          - sts:GetCallerIdentity
          Resource: '*'
    Metadata:
      SamResourceId: CodeBuildTriggerFunction
  CodeBuildTrigger:
    Type: Custom::CodeBuildTrigger
    DependsOn:
    - CodeBuildProject
    - CompilerECRRepository
    - CompilerFunctionIAMRole
    Properties:
      ServiceToken:
        Fn::GetAtt:
        - CodeBuildTriggerFunction
        - Arn
      ProjectName:
        Ref: CodeBuildProject
      JudgeName:
        Ref: JudgeName
      ImageUri:
        Fn::Sub: ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${JudgeName}-compiler-repository:latest
      CompilerRoleArn:
        Fn::GetAtt:
        - CompilerFunctionIAMRole
        - Arn
Outputs:
  ECRRepositoryUri:
    Value:
      Fn::GetAtt:
      - CompilerECRRepository
      - RepositoryUri
  ECRURI:
    Value:
      Fn::Sub: ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${JudgeName}-compiler-repository:latest
  CompilerRoleArn:
    Value:
      Fn::GetAtt:
      - CompilerFunctionIAMRole
      - Arn
  CodeBuildProjectName:
    Value:
      Ref: CodeBuildProject
  CompilerFunctionArn:
    Value:
      Fn::GetAtt:
      - CodeBuildTrigger
      - CompilerFunctionArn
