AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: App Runner deployment for Codebreaker Contest web application

Parameters:
  JudgeName:
    Type: String
  AdminEmail:
    Type: String
    Description: Email address for admin account (will receive temp password)
  CognitoUserPoolId:
    Type: String
  CognitoClientId:
    Type: String
  WebSocketEndpoint:
    Type: String

Resources:
  # ECR Repository for webapp image
  WebAppECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub ${JudgeName}-webapp-repository
      EmptyOnDelete: true
      RepositoryPolicyText:
        Version: '2012-10-17'
        Statement:
          - Sid: AppRunnerAccess
            Effect: Allow
            Principal:
              Service: build.apprunner.amazonaws.com
            Action:
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
              - ecr:BatchCheckLayerAvailability

  # IAM Role for CodeBuild
  WebAppCodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${JudgeName}-webapp-codebuild
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryFullAccess
        - arn:aws:iam::aws:policy/CloudWatchLogsFullAccess

  # CodeBuild Project for building webapp Docker image
  WebAppCodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub ${JudgeName}-webapp-codebuild
      Description: Build webapp Docker image for App Runner
      ServiceRole: !GetAtt WebAppCodeBuildRole.Arn
      Artifacts:
        Type: NO_ARTIFACTS
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_MEDIUM
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
          - Name: AWS_ACCOUNT_ID
            Value: !Ref AWS::AccountId
          - Name: IMAGE_REPO_NAME
            Value: !Sub ${JudgeName}-webapp-repository
      Source:
        Type: GITHUB
        Location: https://github.com/dvdg6566/codebreaker-contest-rebuild
        BuildSpec: buildspec-webapp.yml
      TimeoutInMinutes: 30

  # IAM Role for App Runner to access ECR
  AppRunnerAccessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${JudgeName}-apprunner-access
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: build.apprunner.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSAppRunnerServicePolicyForECRAccess

  # IAM Role for App Runner instance (runtime permissions)
  AppRunnerInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${JudgeName}-apprunner-instance
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: tasks.apprunner.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AppRunnerInstancePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: dynamodb:*
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${JudgeName}-*
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${JudgeName}-*/index/*
              - Effect: Allow
                Action: s3:*
                Resource:
                  - !Sub arn:aws:s3:::${JudgeName}-*
                  - !Sub arn:aws:s3:::${JudgeName}-*/*
              - Effect: Allow
                Action: cognito-idp:*
                Resource: !Sub arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${CognitoUserPoolId}
              - Effect: Allow
                Action: states:*
                Resource: !Sub arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:${JudgeName}-*
              - Effect: Allow
                Action: scheduler:*
                Resource: !Sub arn:aws:scheduler:${AWS::Region}:${AWS::AccountId}:schedule/default/${JudgeName}-*
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${JudgeName}-*
              - Effect: Allow
                Action: iam:PassRole
                Resource: !Sub arn:aws:iam::${AWS::AccountId}:role/${JudgeName}-*

  # Lambda function that triggers CodeBuild and creates App Runner service
  WebAppTriggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${JudgeName}-webapp-deploy-trigger
      Description: Custom Resource handler that triggers CodeBuild and creates App Runner
      CodeUri: ../lambda-functions/webapp-deploy-trigger
      Handler: lambda_function.lambda_handler
      Runtime: python3.14
      Timeout: 900
      MemorySize: 256
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: codebuild:*
              Resource: !GetAtt WebAppCodeBuildProject.Arn
            - Effect: Allow
              Action: apprunner:*
              Resource: '*'
            - Effect: Allow
              Action: iam:PassRole
              Resource:
                - !GetAtt AppRunnerAccessRole.Arn
                - !GetAtt AppRunnerInstanceRole.Arn
            - Effect: Allow
              Action: iam:CreateServiceLinkedRole
              Resource: arn:aws:iam::*:role/aws-service-role/apprunner.amazonaws.com/AWSServiceRoleForAppRunner

  # Custom Resource that triggers deployment
  WebAppTrigger:
    Type: Custom::WebAppTrigger
    DependsOn:
      - WebAppCodeBuildProject
      - WebAppECRRepository
      - AppRunnerAccessRole
      - AppRunnerInstanceRole
    Properties:
      ServiceToken: !GetAtt WebAppTriggerFunction.Arn
      ProjectName: !Ref WebAppCodeBuildProject
      JudgeName: !Ref JudgeName
      AdminEmail: !Ref AdminEmail
      ImageUri: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${JudgeName}-webapp-repository:latest
      AppRunnerAccessRoleArn: !GetAtt AppRunnerAccessRole.Arn
      AppRunnerInstanceRoleArn: !GetAtt AppRunnerInstanceRole.Arn
      CognitoUserPoolId: !Ref CognitoUserPoolId
      CognitoClientId: !Ref CognitoClientId
      WebSocketEndpoint: !Ref WebSocketEndpoint

Outputs:
  AppRunnerServiceUrl:
    Description: URL of the deployed web application
    Value: !GetAtt WebAppTrigger.AppRunnerServiceUrl
  ECRRepositoryUri:
    Description: ECR Repository URI for webapp
    Value: !GetAtt WebAppECRRepository.RepositoryUri
